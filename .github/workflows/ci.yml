# Android CI (gitea#92) — paths assume this directory is the repo root,
# which it becomes after the #38 split (android/ -> its own repository).
# NO release keystore in CI — release builds stay local (see
# docs/github-org-setup.md section 8). Read-only token, pinned majors.
name: ci
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Build debug APK
        run: ./gradlew assembleDebug
