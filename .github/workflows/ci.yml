# Android CI: the pre-merge verify gate. Runs on every push/PR.
# NO release keystore in CI — release builds are signed locally and the
# build.gradle.kts guard pins the canonical key. Read-only token, pinned majors.
name: ci
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: "17"
      - name: Build debug APK
        run: ./gradlew assembleDebug
      - name: Static analysis (detekt)
        run: ./gradlew detekt
      - name: Translations (EN/FR parity — MissingTranslation lint, #52)
        run: ./gradlew lintDebug
      - name: Leak scan (household infra must never ship)
        run: |
          if git ls-files | xargs grep -InE "mphp|soundsync|renoir|192\.168\.50|/nfs/" \
               | grep -viE "\.lock$|workflows/ci\.yml|dev/verify\.sh"; then
            echo "::error::forbidden term(s) found above"; exit 1
          fi
      - name: Secret scan
        # Binary download rather than gitleaks-action: the org Actions policy
        # only allows GitHub-owned + verified-creator actions.
        run: |
          v=8.24.3
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${v}/gitleaks_${v}_linux_x64.tar.gz" | tar -xz gitleaks
          ./gitleaks git --no-banner .
      - name: REUSE lint (per-file SPDX licensing, #50)
        # Python tool; the org Actions policy blocks fsfe/reuse-action, so run it
        # via pipx (preinstalled on the runner). The charset-normalizer extra
        # supplies reuse's encoding detection without needing libmagic.
        run: pipx run --spec 'reuse[charset-normalizer]' reuse lint
