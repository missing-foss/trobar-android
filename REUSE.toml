# REUSE (https://reuse.software) licensing for files that can't carry an inline
# SPDX header — binaries, fonts, and the vendored Gradle wrapper (#50). First-
# party source files carry their own header instead.
version = 1

# --- Brand fonts (OFL-1.1, upstream authors) -------------------------------
[[annotations]]
path = ["app/src/main/res/font/fredoka_semibold.ttf", "app/src/main/res/font/fredoka_bold.ttf"]
precedence = "aggregate"
SPDX-FileCopyrightText = "2016 The Fredoka Project Authors (https://github.com/hafontia/Fredoka-One)"
SPDX-License-Identifier = "OFL-1.1"

[[annotations]]
path = [
  "app/src/main/res/font/space_grotesk_regular.ttf",
  "app/src/main/res/font/space_grotesk_medium.ttf",
  "app/src/main/res/font/space_grotesk_semibold.ttf",
  "app/src/main/res/font/space_grotesk_bold.ttf",
]
precedence = "aggregate"
SPDX-FileCopyrightText = "2020 The Space Grotesk Project Authors (https://github.com/floriankarsten/space-grotesk)"
SPDX-License-Identifier = "OFL-1.1"

[[annotations]]
path = ["app/src/main/res/font/space_mono_regular.ttf", "app/src/main/res/font/space_mono_bold.ttf"]
precedence = "aggregate"
SPDX-FileCopyrightText = "2016 The Space Mono Project Authors (https://github.com/googlefonts/spacemono)"
SPDX-License-Identifier = "OFL-1.1"

# --- First-party brand artwork / icons -------------------------------------
[[annotations]]
path = [
  "app/src/main/res/drawable-nodpi/logo_bard.png",
  "app/src/main/res/drawable-nodpi/ic_launcher_foreground_bard.png",
  "app/src/main/res/drawable-nodpi/ic_notification.png",
]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 missing-foss"
SPDX-License-Identifier = "GPL-3.0-or-later"

# --- .gitignore (no header) ------------------------------------------------
[[annotations]]
path = ".gitignore"
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 missing-foss"
SPDX-License-Identifier = "GPL-3.0-or-later"

# --- Vendored Gradle wrapper (third-party, Apache-2.0 © Gradle) ------------
[[annotations]]
path = [
  "gradlew",
  "gradlew.bat",
  "gradle/wrapper/gradle-wrapper.jar",
  "gradle/wrapper/gradle-wrapper.properties",
]
precedence = "aggregate"
SPDX-FileCopyrightText = "Gradle, Inc."
SPDX-License-Identifier = "Apache-2.0"
